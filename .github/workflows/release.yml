name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write      # Pour créer tags + GitHub Releases
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                  # Très important pour semantic-release + GoReleaser

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # Login Docker Hub (pour GoReleaser si tu pushes des images)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Pour builder des images multi-plateformes (amd64 et arm64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Installation des dépendances de semantic-release (version corrigée)
      - name: Install Semantic Release + dependencies
        run: |
          npm install -g \
            semantic-release \
            @semantic-release/exec \
            @semantic-release/github \
            conventional-changelog-conventionalcommits

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          install-only: true
          version: "~> v2"

      # Lancement de semantic-release
      - name: Run Semantic Release & GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: npx semantic-release